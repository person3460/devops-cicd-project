name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install and Test
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
          python -m pytest test_app.py -vname: CI/CD Pipeline

